name: Waka Readme

on:
  schedule:
    # 05:00 UTC — это ровно 08:00 по МСК
    - cron: '0 5 * * *'
  workflow_dispatch: # Оставляем для ручного запуска

jobs:
  update-readme:
    name: Update this repo's README
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHOW_TITLE: true
          BLOCKS: ░▒▓█
          TIME_RANGE: all_time
          LANG_COUNT: 5
          SHOW_TIME: true
          SHOW_MASKED_TIME: false
